name: Update Dashboard Data

on:
  workflow_dispatch:            # Disparo manual desde GitHub o desde Power Automate
  schedule:
    - cron: '0 6 * * 1-5'      # Respaldo: lunes a viernes a las 6am UTC (8am Colombia)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas openpyxl requests

      - name: Download Excel from OneDrive
        run: |
          curl -L "${{ secrets.ONEDRIVE_DOWNLOAD_URL }}" \
            -H "User-Agent: Mozilla/5.0" \
            -o inventario.xlsx \
            --max-time 60 \
            --retry 3
          echo "✓ Excel descargado: $(du -sh inventario.xlsx | cut -f1)"

      - name: Build data.json from Excel
        run: python build_data.py inventario.xlsx

      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data [$(date +'%Y-%m-%d %H:%M')] [onedrive]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,build_data.py,inventario.xlsx,*.md,requirements.txt'
